name: UI CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      publish_to_marketplace:
        description: Publish to the VS Code Marketplace
        required: true
        type: boolean
        default: false
      publish_to_ovsx:
        description: Publish to Open VSX
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install packaging tools
        run: npm install -g @vscode/vsce ovsx
      - name: Install dependencies
        run: npm ci
      - name: Build extension
        run: npm run build
      - name: Package UI VSIX
        run: npm run vscode:package
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: rsp-wtp-ui
          path: dist/*.vsix
          if-no-files-found: error

  publish:
    if: inputs.publish_to_marketplace == true || inputs.publish_to_ovsx == true
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install publishing tools
        run: npm install -g @vscode/vsce ovsx
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: rsp-wtp-ui
          path: dist
      - name: Publish to VS Code Marketplace
        if: inputs.publish_to_marketplace == true
        run: |
          for vsix in dist/*.vsix; do
            vsce publish --skip-duplicate -p "${{ secrets.VSCODE_MARKETPLACE_TOKEN }}" --packagePath "${vsix}"
          done
      - name: Publish to Open VSX
        if: inputs.publish_to_ovsx == true
        run: |
          for vsix in dist/*.vsix; do
            ovsx publish --skip-duplicate -p "${{ secrets.OVSX_MARKETPLACE_TOKEN }}" --packagePath "${vsix}"
          done
